<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NewsHub</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Segoe UI,sans-serif;
}


:root{

--bg:#e8eef8;
--text:#111827;
--glass:rgba(255,255,255,.35);
--border:rgba(255,255,255,.5);
--shadow:0 20px 40px rgba(0,0,0,.15);

}


.dark{

--bg:#07111f;
--text:white;
--glass:rgba(255,255,255,.08);
--border:rgba(255,255,255,.15);
--shadow:0 20px 40px rgba(0,0,0,.5);

}




body{

min-height:100vh;

background:

radial-gradient(circle at top left,#38bdf8,transparent 35%),
radial-gradient(circle at bottom right,#c084fc,transparent 35%),

var(--bg);


color:var(--text);

transition:.4s;

}





nav{


margin:25px;

padding:22px 35px;


display:flex;

justify-content:space-between;

align-items:center;


background:var(--glass);


backdrop-filter:blur(25px);


border:1px solid var(--border);


border-radius:25px;


box-shadow:var(--shadow);


position:sticky;

top:20px;


z-index:10;


}



nav h1{

font-size:30px;

}




.controls{


display:flex;

gap:12px;

flex-wrap:wrap;


}





input,
button{


padding:12px 18px;


border-radius:15px;


border:1px solid var(--border);


background:var(--glass);


backdrop-filter:blur(10px);


color:var(--text);


outline:none;


}




input{

width:230px;

}





button{


cursor:pointer;

transition:.3s;


}



button:hover{


transform:translateY(-3px);


}






/* CUSTOM DROPDOWN */


.dropdown{

position:relative;

}



.drop-btn{


min-width:140px;


display:flex;


justify-content:space-between;


align-items:center;


}



.dropdown-menu{


position:absolute;


top:55px;


left:0;


width:100%;


background:var(--glass);


backdrop-filter:blur(20px);


border:1px solid var(--border);


border-radius:15px;


overflow:hidden;


opacity:0;


transform:translateY(-15px) scale(.95);


pointer-events:none;


transition:.3s;


box-shadow:var(--shadow);


z-index:20;


}




.dropdown-menu.active{


opacity:1;


transform:translateY(0) scale(1);


pointer-events:auto;


}



.dropdown-menu div{


padding:12px 15px;


cursor:pointer;


transition:.25s;


}



.dropdown-menu div:hover{


background:rgba(255,255,255,.25);


padding-left:25px;


}






#newsContainer,
#bookmarks{


padding:40px;


display:grid;


grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));


gap:30px;


}







.card{


background:var(--glass);


backdrop-filter:blur(25px);


border:1px solid var(--border);


border-radius:25px;


overflow:hidden;


box-shadow:var(--shadow);


transition:.35s;


}



.card:hover{


transform:translateY(-8px) scale(1.02);


}




.card img{


width:100%;


height:200px;


object-fit:cover;


}



.content{


padding:22px;


}



.content h3{


margin-bottom:12px;


}



.content p{


opacity:.8;


line-height:1.5;


}



.actions{


display:flex;


justify-content:space-between;


margin-top:20px;


}



.actions a{


text-decoration:none;


color:#38bdf8;


font-weight:bold;


}



.bookmarks-section{


margin:25px;


padding:20px;


background:var(--glass);


backdrop-filter:blur(20px);


border-radius:25px;


border:1px solid var(--border);


}




@media(max-width:800px){


nav{

flex-direction:column;

gap:20px;

}


input{

width:100%;

}

}


</style>


</head>




<body>



<nav>


<h1>
NewsHub
</h1>



<div class="controls">


<input id="searchInput"
placeholder="Search news...">


<button onclick="searchNews()">
Search
</button>




<div class="dropdown">


<button class="drop-btn" onclick="toggleDropdown()">

<span id="selected">
Tech
</span>

▾

</button>



<div class="dropdown-menu" id="dropdownMenu">


<div onclick="chooseCategory('technology','Tech')">
Tech
</div>


<div onclick="chooseCategory('sports','Sports')">
Sports
</div>


<div onclick="chooseCategory('business','Business')">
Business
</div>


</div>


</div>




<button onclick="getCategoryNews()">
Filter
</button>



<button id="themeToggle">
☾
</button>



</div>


</nav>





<section class="bookmarks-section">


<h2>
Bookmarks
</h2>


<div id="bookmarks"></div>


</section>





<section id="newsContainer"></section>







<script>



const API_KEY =
"77e9a2f0a7b14aed8ca8df6dd7d745e0";



const newsContainer =
document.getElementById("newsContainer");



let selectedCategory="technology";






async function fetchNews(url){


let res=await fetch(url);


let data=await res.json();


displayNews(data.articles);


}





function displayNews(articles){


newsContainer.innerHTML="";



articles.forEach(article=>{


let card=document.createElement("div");


card.className="card";



card.innerHTML=`

<img src="${article.urlToImage || 'https://via.placeholder.com/400'}">


<div class="content">


<h3>
${article.title}
</h3>


<p>
${article.description || "No description"}
</p>



<div class="actions">


<a href="${article.url}" target="_blank">
Read
</a>


<button onclick='saveBookmark(${JSON.stringify(article)})'>
☆
</button>



</div>


</div>

`;


newsContainer.appendChild(card);



});


}







function searchNews(){


let q=document.getElementById("searchInput").value;



fetchNews(

`https://newsapi.org/v2/everything?q=${q}&pageSize=20&apiKey=${API_KEY}`

);


}







function getCategoryNews(){



fetchNews(

`https://newsapi.org/v2/top-headlines?country=us&category=${selectedCategory}&pageSize=20&apiKey=${API_KEY}`

);


}






function toggleDropdown(){


document
.getElementById("dropdownMenu")
.classList.toggle("active");


}




function chooseCategory(value,name){


selectedCategory=value;


document.getElementById("selected").innerText=name;



document
.getElementById("dropdownMenu")
.classList.remove("active");


}






function saveBookmark(article){



let saved=

JSON.parse(localStorage.getItem("savedNews"))
||
[];




if(!saved.some(x=>x.url===article.url)){


saved.push(article);


}



localStorage.setItem(

"savedNews",

JSON.stringify(saved)

);



loadBookmarks();


}






function loadBookmarks(){


let saved=

JSON.parse(localStorage.getItem("savedNews"))
||
[];



let box=document.getElementById("bookmarks");


box.innerHTML="";



saved.forEach(article=>{


box.innerHTML+=`


<div class="card">


<img src="${article.urlToImage || 'https://via.placeholder.com/400'}">


<div class="content">


<h3>
${article.title}
</h3>


<a href="${article.url}" target="_blank">
Open
</a>


</div>


</div>


`;



});


}






document
.getElementById("themeToggle")
.onclick=()=>{


document.body.classList.toggle("dark");


localStorage.setItem(

"darkMode",

document.body.classList.contains("dark")

);


};




if(localStorage.getItem("darkMode")=="true"){

document.body.classList.add("dark");

}



loadBookmarks();



fetchNews(

`https://newsapi.org/v2/top-headlines?country=us&pageSize=20&apiKey=${API_KEY}`

);



</script>



</body>
</html>
